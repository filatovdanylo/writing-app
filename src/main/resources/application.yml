spring:
  application:
    name: calmly-writer
  datasource:
    url: jdbc:h2:file:./data/calmly-writer
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console
app:
  jwt:
    secret: ${JWT_SECRET:calmly-writer-dev-secret-change-me-in-production-32chars}
    expiration-ms: 86400000
    cookie-name: auth_token
    cookie-secure: false

server:
  port: 8080
