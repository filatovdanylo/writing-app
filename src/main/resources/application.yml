spring:
  application:
    name: calmly-writer
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      path: /h2-console
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    cookie-name: auth_token
    cookie-secure: ${COOKIE_SECURE:false}

server:
  port: ${PORT:8080}
