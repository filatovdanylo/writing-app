<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calmly Writer</title>
    <script>
        (function () {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/editor.css">
</head>
<body class="editor-page">
<div class="chrome-trigger" id="chrome-trigger"></div>

<header class="chrome" id="chrome">
    <div class="chrome-left">
        <button class="chrome-btn" id="btn-documents" title="Documents (Ctrl+O)">Documents</button>
        <input type="text" class="title-input" id="title-input" placeholder="Untitled" spellcheck="false">
    </div>
    <div class="chrome-right">
        <span class="save-status hidden" id="save-status"></span>
        <button class="chrome-btn theme-toggle" id="theme-toggle" title="Toggle theme">☾</button>
        <button class="chrome-btn" id="btn-logout">Logout</button>
    </div>
</header>

<main class="editor-container">
    <div class="editor-column">
        <textarea
                class="editor-textarea"
                id="editor-textarea"
                placeholder="Start writing…"
                spellcheck="true"
                autofocus
        ></textarea>
    </div>
</main>

<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-header">
        <h2>Documents</h2>
        <button class="chrome-btn" id="drawer-close">✕</button>
    </div>
    <div class="drawer-actions">
        <button class="btn-new-doc" id="btn-new-doc">New document</button>
    </div>
    <ul class="document-list" id="document-list"></ul>
</aside>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/documents.js"></script>
<script src="/js/editor.js"></script>
</body>
</html>
